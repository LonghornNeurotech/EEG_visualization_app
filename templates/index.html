<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload EEG Data Files</title>
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"> -->
</head>
<body>
    <h1>Upload Two EEG Data Files</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <label for="file1">Select the first .npy file:</label>
        <input type="file" id="file1" name="file1" accept=".npy" required><br><br>
        
        <label for="file2">Select the second .npy file:</label>
        <input type="file" id="file2" name="file2" accept=".npy" required><br><br>

        <button type="submit">Upload</button>
    </form>
</body>
</html>
